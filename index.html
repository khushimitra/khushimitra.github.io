<!DOCTYPE html> <html lang="en"> 
    <head> <meta charset="UTF-8">
         <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
         <title>Feedback Collection System</title> 
         <link rel="stylesheet" href="style.css">
         </head> 
         <body>
             <div class="container">
                 <h1>College Feedback System</h1>
                  <div class="card"> <input type="text" placeholder="Enter Name">
                     <input type="email" placeholder="Enter Email">
                      <select> 
                        <option>Select Course</option>
                         <option>BCA</option> 
                         <option>BBA</option>
                          <option>BTech</option>
                         </select>
                          <label>Rate Experience</label>
                           <div class="rating">
                             <button>1⭐</button>
                              <button>2⭐</button>
                               <button>3⭐</button>
                                <button>4⭐</button> 
                                <button>5⭐</button>
                             </div> 
                             <textarea placeholder="Write your feedback..." rows="5"> </textarea>
                              <button class="submit-btn"> Submit Feedback </button>
                             </div> </div> 
                             <script src="script.js"></script>
                             
                             </body> </html>
