<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-Sonic Mood Music</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    * {margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif;}
    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      text-align: center;
      transition: background 2s ease;
      background: linear-gradient(135deg, #3a1c71, #d76d77, #ffaf7b);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
    }

    @keyframes gradient {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      max-width: 520px;
      transition: all 0.5s ease;
    }

    h1 {
      font-size: 2.3rem;
      margin-bottom: 15px;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    p {
      font-size: 1rem;
      opacity: 0.9;
      margin-bottom: 25px;
    }

    .moods {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
    }

    button {
      border: none;
      padding: 12px 22px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1rem;
      color: #fff;
      background: rgba(255, 255, 255, 0.2);
      transition: all 0.4s ease;
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    button:hover {
      background: rgba(255,255,255,0.4);
      transform: scale(1.08);
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    footer {
      margin-top: 25px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <canvas id="bgCanvas"></canvas>

  <div class="container" id="mainContainer">
    <h1>🎧 K-Sonic Mood </h1>
    <p>Select your mood and let the music match your vibe!</p>

    <div class="moods">
      <button onclick="setMood('happy')">😊 Happy</button>
      <button onclick="setMood('sad')">😢 Sad</button>
      <button onclick="setMood('chill')">😎 Chill</button>
      <button onclick="setMood('romantic')">💖 Romantic</button>
      <button onclick="setMood('energetic')">🔥 Energetic</button>
    </div>

    <footer>© 2025 K-Sonic | Live Mood Music Experience</footer>
  </div>

  <audio id="bgMusic" loop></audio>
  <div id="spotifyPlayer" style="margin-top:20px;">
  <iframe id="spotifyFrame" width="300" height="380" frameborder="0"
    allowtransparency="true" allow="encrypted-media"></iframe>
</div>
  <script>
    // MUSIC & MOOD SETTINGS
    const bgMusic = document.getElementById("bgMusic");
    const container = document.getElementById("mainContainer");

    const moods = {
      happy: {
        gradient: "linear-gradient(135deg, #ffb347, #ffcc33)",
        glow: "0 0 30px #ffdd57",
        music: "https://cdn.pixabay.com/download/audio/2022/03/15/audio_8a16f8a47d.mp3?filename=sunny-day-110397.mp3"
      },
      sad: {
        gradient: "linear-gradient(135deg, #283048, #859398)",
        glow: "0 0 30px #a8c0ff",
        music: "https://cdn.pixabay.com/download/audio/2021/09/07/audio_25ebcf5b4d.mp3?filename=sadness-108328.mp3"
      },
      chill: {
        gradient: "linear-gradient(135deg, #355c7d, #6c5b7b, #c06c84)",
        glow: "0 0 30px #b39ddb",
        music: "https://cdn.pixabay.com/download/audio/2023/02/28/audio_316c5575bb.mp3?filename=lofi-study-141022.mp3"
      },
      romantic: {
        gradient: "linear-gradient(135deg, #ff9a9e, #fecfef)",
        glow: "0 0 30px #ff8fa3",
        music: "https://cdn.pixabay.com/download/audio/2023/06/14/audio_78fddc8c9a.mp3?filename=romantic-song-146766.mp3"
      },
      energetic: {
        gradient: "linear-gradient(135deg, #00c9ff, #92fe9d)",
        glow: "0 0 30px #00ffb0",
        music: "https://cdn.pixabay.com/download/audio/2023/02/28/audio_b33fa97727.mp3?filename=energetic-rock-141053.mp3"
      }
    };

    function setMood(mood) {
      const selected = moods[mood];
      document.body.style.background = selected.gradient;
      document.body.style.backgroundSize = "400% 400%";
      container.style.boxShadow = selected.glow;
      bgMusic.src = selected.music;
      bgMusic.play().catch(err => console.log("Autoplay blocked:", err));
      container.animate(
        [{ transform: "scale(1)" }, { transform: "scale(1.05)" }, { transform: "scale(1)" }],
        { duration: 600, easing: "ease-in-out" }
      );
      // Update Spotify iframe based on mood
      const spotifyFrame = document.getElementById("spotifyFrame");
      const spotifyPlaylists = {
        happy: "37i9dQZF1DXdPec7aLTmlC", // Happy Hits
        sad: "37i9dQZF1DX7qK8ma5wgG1",   // Sad Songs
        chill: "37i9dQZF1DX4WYpdgoIcn6", // Chill Hits
        romantic: "37i9dQZF1DX50QitC6Oqtn", // Love Songs
        energetic: "37i9dQZF1DX8FwnYE6PRvL" // Energy Booster
      };
      const playlistId = spotifyPlaylists[mood];
     spotifyFrame.src = `https://open.spotify.com/embed/playlist/${playlistId}`;
    }
    // BACKGROUND PARTICLES (BUBBLES)
    const canvas = document.getElementById("bgCanvas");
    const ctx = canvas.getContext("2d");
    let width = (canvas.width = window.innerWidth);
    let height = (canvas.height = window.innerHeight);
    const particles = [];
    const colors = ["#ffffff", "#ffb6c1", "#b0e0e6", "#ffe4b5", "#d8bfd8"];
    class Particle { 
      constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.radius = Math.random() * 4 + 1;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.speedY = Math.random() * 1 + 0.2;
        this.alpha = Math.random() * 0.7 + 0.3;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.alpha;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      update() {
        this.y -= this.speedY;
        if (this.y < 0) {
          this.y = height + this.radius;
          this.x = Math.random() * width;
        }
      }
    }
    for (let i = 0; i < 80; i++) {
      particles.push(new Particle());
    }
    function animateParticles() {
      ctx.clearRect(0, 0, width, height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();
    window.addEventListener("resize", () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
