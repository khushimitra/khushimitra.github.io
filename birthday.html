
 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="hidden" id="greeting">Happy Birthday</h1>
        <p class="hidden" id="message">"Happy Birthday! Wishing you a day filled with love,
             laughter, and unforgettable moments. May this year bring you endless joy and success.
              Cheers to another amazing year ahead!"</p>
        </p>
        <button id="surpriseBtn">Click here </button>
    </div>
    <style>
        body {
    margin: 0;
    padding: 0;
    background-color: #1a0b1c; /* Deep romantic dark purple */
    color: #ffffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden; /* Prevents scrollbars when hearts float */
    text-align: center;
}

.container {
    z-index: 10;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1 {
    font-size: 3.5rem;
    color: #ff4d6d;
    text-shadow: 0 0 15px #ff4d6d; /* Romantic glow effect */
    margin-bottom: 10px;
    opacity: 0; /* Hidden initially */
    transition: opacity 2s ease-in-out;
}

p {
    font-size: 1.4rem;
    max-width: 600px;
    line-height: 1.6;
    margin-bottom: 40px;
    opacity: 0; /* Hidden initially */
    transition: opacity 2s ease-in-out 1.5s; /* Appears slightly after the heading */
}

button {
    padding: 15px 35px;
    font-size: 1.2rem;
    font-weight: bold;
    background-color: #ff4d6d;
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
    transition: transform 0.3s, box-shadow 0.3s, opacity 0.5s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(255, 77, 109, 0.8);
}

/* Class added by JavaScript to reveal the text */
.show {
    opacity: 1 !important;
}

/* Styling for the floating hearts generated by JavaScript */
.heart {
    position: absolute;
    color: #ff4d6d;
    animation: floatUp 4s ease-in forwards;
    opacity: 0.8;
    z-index: 1;
}

/* The animation that makes the hearts float from bottom to top */
@keyframes floatUp {
    0% {
        transform: translateY(100vh) scale(0.5) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translateY(-20vh) scale(1.5) rotate(45deg);
        opacity: 0;
    }
}
    </style>

    <script>
        const btn = document.getElementById('surpriseBtn');
const greeting = document.getElementById('greeting');
const message = document.getElementById('message');

btn.addEventListener('click', () => {
   
    btn.style.opacity = '0';
    setTimeout(() => {
        btn.style.display = 'none';
    }, 500);

  
    greeting.classList.add('show');
    message.classList.add('show');

    // Start generating floating hearts every 300 milliseconds
    setInterval(createHeart, 300);
});

function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerHTML = '💖'; // You can change this to 💖 or ✨

    // Randomize the starting position across the width of the screen
    heart.style.left = Math.random() * 100 + 'vw';
    
    // Randomize the animation speed slightly for a natural look
    heart.style.animationDuration = Math.random() * 3 + 6 + 's'; 
    
    // Randomize the size of the hearts
    heart.style.fontSize = Math.random() * 2 + 1 + 'rem';

    document.body.appendChild(heart);

    // Clean up the hearts after they float off-screen so the browser doesn't crash
    setTimeout(() => {
        heart.remove();
    }, 500);
}
    </script>
</body>
</html>
